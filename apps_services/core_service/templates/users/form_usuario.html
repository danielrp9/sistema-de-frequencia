{% extends 'base.html' %}

{% block content %}
<div class="p-6 md:p-12 max-w-2xl mx-auto">
    <header class="mb-10 text-center">
        <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.2em] mb-2">New Identity Node</p>
        <h1 class="text-3xl font-black text-white tracking-tight uppercase italic">Provisionar <span class="text-indigo-500">Usuário</span></h1>
    </header>

    <form method="post" class="bg-slate-900/40 p-8 md:p-10 rounded-3xl border border-white/5 shadow-2xl space-y-6">
        {% csrf_token %}
        
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Username / Login</label>
            <input type="text" name="username" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500 mono">
        </div>

        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">E-mail Institucional</label>
            <input type="email" name="email" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500 mono">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Senha Inicial</label>
                <input type="password" name="password" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500 mono">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Papel no Sistema (Role)</label>
                <select name="role" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500 appearance-none mono">
                    <option value="aluno">DISCENTE (ALUNO)</option>
                    <option value="professor">DOCENTE (PROFESSOR)</option>
                </select>
            </div>
        </div>

        <div class="pt-8 border-t border-white/5">
            <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-xs uppercase tracking-[0.2em] transition-all">
                Finalizar Provisionamento
            </button>
            <a href="{% url 'gestao_usuarios' %}" class="block text-center mt-6 text-[10px] font-bold text-slate-600 uppercase tracking-widest hover:text-white transition-colors">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
