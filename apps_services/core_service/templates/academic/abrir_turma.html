{% extends 'base.html' %}

{% block title %}Nova Turma | SisPres{% endblock %}

{% block content %}
<div class="p-6 md:p-12 max-w-7xl mx-auto">
    <header class="page-header-container flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
        <div class="flex items-center gap-6">
            <a href="{% url 'dashboard' %}" class="btn-back-minimal">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <div>
                <h1 class="page-title">Abrir <span class="text-indigo-500">Nova Turma</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-2 ml-1">Ativação de Turma Semestral</p>
            </div>
        </div>
        <div class="header-accent"></div>
    </header>

    <div class="w-full">
        <form method="post" class="glass-surface p-8 md:p-10 rounded-[2.5rem] space-y-8 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-indigo-500/20 to-transparent"></div>
            {% csrf_token %}

            <div class="space-y-3">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Disciplina Base Autorizada</label>
                <div class="relative">
                    <select name="disciplina" required class="w-full bg-slate-950 border border-white/10 rounded-2xl px-6 py-4 text-sm text-white focus:border-indigo-500 transition-all appearance-none cursor-pointer mono">
                        <option value="" disabled selected>-- SELECIONAR_DISCIPLINA --</option>
                        {% for disc in disciplinas_disponiveis %}
                            <option value="{{ disc.id }}">{{ disc.codigo }} — {{ disc.nome }}</option>
                        {% endfor %}
                    </select>
                    <div class="absolute inset-y-0 right-6 flex items-center pointer-events-none text-slate-600">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </div>
                </div>
                <p class="text-[9px] text-slate-600 font-medium ml-1">Apenas disciplinas sob sua responsabilidade base são listadas.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Semestre Letivo</label>
                    <input type="text" name="semestre" required placeholder="ex: 2026.1"
                        class="w-full bg-slate-950 border border-white/10 rounded-2xl px-6 py-4 text-sm text-white focus:border-indigo-500 transition-all mono">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Status de Disponibilidade</label>
                    <div class="relative">
                        <select name="ativa" class="w-full bg-slate-950 border border-white/10 rounded-2xl px-6 py-4 text-sm text-white focus:border-indigo-500 transition-all appearance-none mono">
                            <option value="True">OPERACIONAL (ATIVO)</option>
                            <option value="False">STANDBY (INATIVO)</option>
                        </select>
                        <div class="absolute inset-y-0 right-6 flex items-center pointer-events-none text-slate-600">
                            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-8 border-t border-white/5">
                <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-2xl font-bold text-xs uppercase tracking-[0.2em] shadow-xl shadow-indigo-900/40 transition-all active:scale-[0.98]">
                    Efetivar Abertura de Turma
                </button>
                <a href="{% url 'dashboard' %}" class="block text-center mt-6 text-[10px] font-bold text-slate-600 uppercase tracking-widest hover:text-white transition-colors">Cancelar Operação</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
