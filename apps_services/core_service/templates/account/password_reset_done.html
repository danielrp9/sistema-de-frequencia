<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status do E-mail | SisPre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; min-height: 100vh; }
        .glass-auth { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="flex items-center justify-center p-6 text-center">

    <div class="glass-auth w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl relative border-t-2 border-indigo-500/30">
        <div class="mb-8 relative">
            <div class="bg-indigo-500/10 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto border border-indigo-500/20">
                <svg class="w-12 h-12 text-indigo-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
        </div>

        <header class="mb-8">
            <h1 class="text-2xl font-black text-white italic tracking-tight">Check Incoming</h1>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-4 leading-loose">
                Um token de recuperação foi enviado para o seu e-mail acadêmico.
            </p>
        </header>

        <div class="space-y-4 text-[10px] mono font-bold text-slate-400">
            <p class="p-5 bg-indigo-900/10 rounded-2xl border border-indigo-500/10 text-indigo-400/80 leading-relaxed uppercase">
                Verifique o diretório de SPAM caso o log de recebimento não ocorra em 60 segundos.
            </p>
        </div>

        <footer class="mt-10 pt-8 border-t border-white/5">
            <a href="{% url 'account_login' %}" 
               class="inline-block px-10 py-4 bg-white text-slate-950 font-black rounded-2xl text-[10px] uppercase tracking-[0.2em] transition-all hover:bg-indigo-500 hover:text-white">
                Retornar ao Login
            </a>
        </footer>
    </div>

</body>
</html>
