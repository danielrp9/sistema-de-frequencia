<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Credenciais | SisPre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; min-height: 100vh; }
        .glass-auth { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        input { background: rgba(7, 10, 22, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; font-family: 'JetBrains Mono', monospace; }
        input:focus { border-color: #6366f1 !important; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-auth w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-2xl font-black text-white italic tracking-tight uppercase">Update Password</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2">Segurança de Camada Distribuída</p>
        </header>

        {% if token_fail %}
            <div class="text-center py-6">
                <p class="text-red-400 font-bold mono text-xs uppercase mb-6">TOKEN_EXPIRED: Link de redefinição inválido.</p>
                <a href="{% url 'account_reset_password' %}" class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest underline">Solicitar Novo Link</a>
            </div>
        {% else %}
            <form method="POST" action="{{ action_url }}" class="space-y-6">
                {% csrf_token %}
                
                {% if form.errors %}
                    <div class="p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] mono font-bold uppercase">
                        ERR_VALIDATION: Dados inconsistentes.
                    </div>
                {% endif %}

                {% for field in form %}
                <div class="space-y-2">
                    <label for="{{ field.id_for_label }}" class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">
                        {{ field.label }}
                    </label>
                    <input type="password" name="{{ field.html_name }}" id="{{ field.id_for_label }}" 
                           placeholder="••••••••" class="w-full px-5 py-4 rounded-2xl transition-all" required>
                </div>
                {% endfor %}

                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-4 rounded-2xl shadow-xl transition-all uppercase text-xs tracking-[0.2em]">
                    Atualizar Credencial
                </button>
            </form>
        {% endif %}
    </div>

</body>
</html>
