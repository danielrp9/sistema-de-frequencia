<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha de Cadastro | Sistema de Frequência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.08) 0px, transparent 50%);
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .choice-btn {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .choice-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: #6366f1;
            transform: translateY(-4px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="glass-card w-full max-w-lg rounded-[2.5rem] p-10 relative overflow-hidden text-center">
        <div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-transparent via-indigo-500/40 to-transparent"></div>
        
        <header class="mb-12">
            <h1 class="text-3xl font-black text-white tracking-tight mb-3">
                Identifique-se<span class="text-indigo-500">.</span>
            </h1>
            <p class="text-sm font-medium text-slate-400">Como você deseja se vincular ao sistema?</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="{% url 'signup_aluno' %}" class="choice-btn p-8 rounded-3xl group">
                <div class="w-16 h-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-indigo-500/20 transition-colors">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-white mb-2">Discente</h3>
                <p class="text-xs text-slate-500 font-medium">Para estudantes de graduação e pós-graduação.</p>
            </a>

            <a href="{% url 'signup_professor' %}" class="choice-btn p-8 rounded-3xl group">
                <div class="w-16 h-16 bg-emerald-500/10 rounded-2xl flex items-center justify-center mx-auto mb-4 group-hover:bg-emerald-500/20 transition-colors">
                    <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
                    </svg>
                </div>
                <h3 class="text-lg font-bold text-white mb-2">Docente</h3>
                <p class="text-xs text-slate-500 font-medium">Para professores e coordenadores acadêmicos.</p>
            </a>
        </div>

        <footer class="mt-12 pt-8 border-t border-white/5">
            <p class="text-xs text-slate-500 font-medium">Já possui uma conta? <a href="{% url 'account_login' %}" class="text-indigo-400 hover:text-indigo-300 font-bold ml-1">Entrar</a></p>
        </footer>
    </div>

</body>
</html>
