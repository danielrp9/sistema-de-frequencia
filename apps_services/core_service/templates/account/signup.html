<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | SisPre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; min-height: 100vh; }
        .glass-auth { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
        input { background: rgba(7, 10, 22, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: #6366f1 !important; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center p-6 py-12">
    <div class="glass-auth w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl border-b-4 border-indigo-500/20">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-black text-white tracking-tighter italic">CADASTRAR USUÁRIO<span class="text-indigo-500">.</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2">
                Já é registrado? 
                <a href="{{ login_url }}" class="text-indigo-400 hover:text-indigo-300 font-black">LOGIN</a>
            </p>
        </header>

        <form method="POST" action="{% url 'account_signup' %}" class="space-y-5">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-4 rounded-2xl bg-red-500/10 border border-red-500/20 text-red-400 text-[10px] mono font-bold uppercase tracking-tighter">
                    {{ form.errors }}
                </div>
            {% endif %}

            <div class="grid grid-cols-1 gap-5">
                {% for field in form %}
                <div class="space-y-1">
                    <label for="{{ field.id_for_label }}" class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">
                        {{ field.label }}
                    </label>
                    <input type="{{ field.field.widget.input_type }}" 
                           name="{{ field.html_name }}" 
                           id="{{ field.id_for_label }}" 
                           class="mono w-full px-5 py-3.5 rounded-2xl transition-all"
                           {% if field.field.required %}required{% endif %}>
                    {% if field.help_text %}
                        <p class="text-[9px] text-slate-600 leading-tight px-1 font-bold">{{ field.help_text }}</p>
                    {% endif %}
                </div>
                {% endfor %}
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 px-4 rounded-2xl shadow-xl transition-all uppercase text-xs tracking-[0.2em] mt-6">
                Confirmar Registro
            </button>
        </form>
    </div>
</body>
</html>
