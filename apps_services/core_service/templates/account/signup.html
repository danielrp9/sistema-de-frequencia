<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Frequência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; }
        input:focus { border-color: #3b82f6 !important; outline: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4 py-12">
    <div class="glass w-full max-w-lg rounded-2xl p-10 shadow-2xl">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-white tracking-tight">Criar Conta</h1>
            <p class="text-slate-400 mt-3 text-sm">
                Já possui uma conta? 
                <a href="{{ login_url }}" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Faça login</a>
            </p>
        </header>

        <form method="POST" action="{% url 'account_signup' %}" class="space-y-5">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-3 rounded-lg bg-red-500/20 border border-red-500/50 text-red-200 text-xs">
                    {{ form.errors }}
                </div>
            {% endif %}

            {% for field in form %}
            <div class="space-y-1">
                <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-300">
                    {{ field.label }}
                </label>
                <input type="{{ field.field.widget.input_type }}" 
                       name="{{ field.html_name }}" 
                       id="{{ field.id_for_label }}" 
                       class="w-full px-4 py-3 rounded-xl transition-all"
                       {% if field.field.required %}required{% endif %}>
                {% if field.help_text %}
                    <p class="text-[10px] text-slate-500 leading-tight">{{ field.help_text }}</p>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all active:scale-[0.98] mt-4">
                Finalizar Cadastro
            </button>
        </form>
    </div>
</body>
</html>
