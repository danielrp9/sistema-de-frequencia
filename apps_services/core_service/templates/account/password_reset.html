<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperação | SisPre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; min-height: 100vh; }
        .glass-auth { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input { background: rgba(7, 10, 22, 0.5) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="flex items-center justify-center p-6">
    <div class="glass-auth w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden">
        <header class="text-center mb-10">
            <div class="bg-indigo-500/10 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/20">
                <span class="text-2xl">🗝️</span>
            </div>
            <h1 class="text-2xl font-black text-white italic tracking-tight uppercase">Forgot Identity?</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-3 leading-relaxed">
                Insira o e-mail institucional para sincronizar nova chave.
            </p>
        </header>

        <form method="POST" action="{% url 'account_reset_password' %}" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="id_email" class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">E-mail Cadastrado</label>
                <input type="email" name="email" id="id_email" required 
                    placeholder="institucional@ufvjm.edu.br"
                    class="w-full px-5 py-4 rounded-2xl transition-all focus:border-indigo-500 outline-none">
            </div>

            <button type="submit" 
                class="w-full bg-white hover:bg-indigo-500 text-slate-950 hover:text-white font-black py-4 px-4 rounded-2xl shadow-xl transition-all uppercase text-[10px] tracking-[0.2em]">
                Gerar Link de Sincronia
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="{% url 'account_login' %}" class="text-[10px] font-bold text-indigo-400 hover:text-indigo-300 transition-colors uppercase tracking-[0.2em]">
                Voltar ao Login
            </a>
        </div>
    </div>
</body>
</html>
