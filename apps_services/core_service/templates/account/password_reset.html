<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Sistema de Frequência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; color: white !important; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass w-full max-w-md rounded-2xl p-10 shadow-2xl">
        <header class="text-center mb-8">
            <div class="bg-blue-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">🔑</span>
            </div>
            <h1 class="text-2xl font-bold text-white">Esqueceu a senha?</h1>
            <p class="text-slate-400 mt-2 text-sm leading-relaxed">
                Insira seu e-mail institucional abaixo para receber as instruções de redefinição.
            </p>
        </header>

        <form method="POST" action="{% url 'account_reset_password' %}" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-2">
                <label for="id_email" class="block text-sm font-medium text-slate-300">E-mail Cadastrado</label>
                <input type="email" name="email" id="id_email" required 
                    placeholder="exemplo@ufvjm.edu.br"
                    class="w-full px-4 py-3 rounded-xl transition-all focus:border-blue-500 outline-none">
            </div>

            <button type="submit" 
                class="w-full bg-slate-100 hover:bg-white text-slate-900 font-bold py-3 px-4 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                Enviar Instruções
            </button>
        </form>

        <div class="mt-8 text-center">
            <a href="{% url 'account_login' %}" class="text-sm text-blue-400 hover:text-blue-300 transition-colors underline">
                Voltar para o Login
            </a>
        </div>
    </div>
</body>
</html>
