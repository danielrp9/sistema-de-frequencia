<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar - Sistema de Frequência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
        }
        input:focus {
            border-color: #3b82f6 !important;
            outline: none;
            ring: 2px;
            ring-color: #3b82f6;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass w-full max-w-md rounded-2xl p-10 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-white tracking-tight">Entrar</h1>
            <p class="text-slate-400 mt-3">
                Novo por aqui? 
                <a href="{{ signup_url }}" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Crie sua conta</a>
            </p>
        </header>

        <form method="POST" action="{% url 'account_login' %}" class="space-y-6">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="p-3 rounded-lg bg-red-500/20 border border-red-500/50 text-red-200 text-sm">
                    E-mail ou senha incorretos.
                </div>
            {% endif %}

            <div class="space-y-2">
                <label for="id_login" class="block text-sm font-medium text-slate-300">E-mail</label>
                <input type="email" name="login" id="id_login" required 
                    placeholder="seu@email.com"
                    class="w-full px-4 py-3 rounded-xl transition-all">
            </div>

            <div class="space-y-2">
                <div class="flex justify-between">
                    <label for="id_password" class="block text-sm font-medium text-slate-300">Senha</label>
                    <a href="{% url 'account_reset_password' %}" class="text-xs text-blue-400 hover:underline">Esqueceu a senha?</a>
                </div>
                <input type="password" name="password" id="id_password" required 
                    placeholder="••••••••"
                    class="w-full px-4 py-3 rounded-xl transition-all">
            </div>

            <div class="flex items-center">
                <input type="checkbox" name="remember" id="id_remember" 
                    class="h-4 w-4 rounded border-slate-700 bg-slate-800 text-blue-600 focus:ring-blue-500">
                <label for="id_remember" class="ml-2 block text-sm text-slate-400">Lembrar de mim</label>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98]">
                Acessar Sistema
            </button>
        </form>

        <footer class="mt-8 text-center">
            <p class="text-xs text-slate-500 uppercase tracking-widest">UFVJM • Campus JK</p>
        </footer>
    </div>

</body>
</html>
