{% extends 'base.html' %}

{% block content %}
<div class="p-6 md:p-10 min-h-[90vh] flex flex-col items-center justify-center">
    <div class="bg-slate-900/60 max-w-lg w-full rounded-[2.5rem] p-8 text-center border border-white/10 shadow-2xl relative overflow-hidden">
        <div class="absolute top-4 left-4 w-4 h-4 border-t-2 border-l-2 border-indigo-500/40"></div>
        <div class="absolute bottom-4 right-4 w-4 h-4 border-b-2 border-r-2 border-indigo-500/40"></div>

        <header class="mb-10">
            <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.3em] mb-2">Input Sensor</p>
            <h1 class="text-3xl font-black text-white tracking-tighter italic uppercase">Scanner de <span class="text-indigo-500">Presenca</span></h1>
        </header>

        <div class="relative rounded-2xl overflow-hidden border border-white/10 bg-black shadow-[0_0_50px_rgba(99,102,241,0.1)] mb-8">
            <div id="reader" class="w-full h-72"></div>
            <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
                <div class="w-48 h-48 border border-indigo-500/50 rounded-lg relative">
                    <div class="absolute inset-0 scanner-hud-line"></div>
                </div>
            </div>
        </div>

        <div id="status-message" class="text-slate-500 text-[10px] font-bold uppercase mono tracking-[0.2em] animate-pulse">
            Sincronizando hardware...
        </div>

        <div id="error-log" class="mt-6 p-3 bg-red-500/10 border border-red-500/20 text-red-500 text-[9px] font-bold mono uppercase hidden"></div>

        <div class="mt-10 border-t border-white/5 pt-6">
            <a href="{% url 'dashboard' %}" class="text-slate-600 hover:text-white transition-colors text-[10px] font-bold uppercase tracking-widest">
                Terminar Captura
            </a>
        </div>
    </div>
</div>

<style>
    @keyframes scan-hud { 0% { top: 0%; } 100% { top: 100%; } }
    .scanner-hud-line {
        height: 1px;
        background: #6366f1;
        box-shadow: 0 0 15px #6366f1;
        width: 100%;
        position: absolute;
        animation: scan-hud 2s linear infinite;
    }
</style>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    const statusMsg = document.getElementById('status-message');
    const errorLog = document.getElementById('error-log');
    const apiRegistrarPresencaUrl = "{% url 'api_registrar_presenca' %}";
    const dashboardUrl = "{% url 'dashboard' %}";
    let scannerAtivo = false;

    const scanner = new Html5Qrcode("reader");
    const config = { fps: 20, qrbox: { width: 220, height: 220 } };

    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
        return null;
    }

    function atualizarStatus(text, colorClass) {
        statusMsg.innerText = text;
        statusMsg.classList.remove('text-slate-500', 'text-indigo-400', 'text-emerald-500', 'text-red-400');
        statusMsg.classList.add(colorClass);
    }

    function exibirErro(message) {
        errorLog.innerText = message;
        errorLog.classList.remove('hidden');
        atualizarStatus('FALHA_DE_REGISTRO', 'text-red-400');
    }

    function exibirSucesso(data) {
        const disciplina = data.dados?.disciplina || data.mensagem || 'PRESENCA_REGISTRADA';
        atualizarStatus(disciplina, 'text-emerald-500');
        errorLog.classList.add('hidden');
        setTimeout(() => { location.href = dashboardUrl; }, 1800);
    }

    function reiniciarScanner() {
        setTimeout(() => {
            errorLog.classList.add('hidden');
            iniciarScanner();
        }, 2500);
    }

    async function enviarPresenca(payload) {
        const response = await fetch(apiRegistrarPresencaUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify(payload),
        });

        const data = await response.json().catch(() => ({
            sucesso: false,
            codigo: 'RESPOSTA_INVALIDA',
            mensagem: 'Resposta invalida da API.',
        }));

        if (!response.ok || !data.sucesso) {
            const detail = data.mensagem || data.erro || JSON.stringify(data.erros) || 'Erro desconhecido.';
            throw new Error(`${data.codigo || response.status}: ${detail}`);
        }

        return data;
    }

    async function processarPresenca(decodedText) {
        try {
            const url = new URL(decodedText);
            const params = new URLSearchParams(url.search);
            const aulaId = params.get('id');
            const token = params.get('token');

            if (!aulaId || !token) throw new Error("INVALID_TOKEN_FORMAT");

            atualizarStatus("FETCHING_GEO_COORDINATES...", 'text-indigo-400');

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const payload = {
                    aula_id: aulaId,
                    token: token,
                    latitude: pos.coords.latitude,
                    longitude: pos.coords.longitude,
                };

                try {
                    const data = await enviarPresenca(payload);
                    exibirSucesso(data);
                } catch (error) {
                    exibirErro(error.message);
                    reiniciarScanner();
                }
            }, () => {
                exibirErro("GEO_ERROR: Permissao de localizacao obrigatoria.");
                reiniciarScanner();
            }, { enableHighAccuracy: true });

        } catch (error) {
            exibirErro(`DECODE_ERROR: ${error.message}`);
            reiniciarScanner();
        }
    }

    function onScanSuccess(decodedText) {
        scanner.stop().then(() => {
            scannerAtivo = false;
            atualizarStatus("TOKEN_DETECTED: PROCESSING...", 'text-indigo-400');
            processarPresenca(decodedText);
        });
    }

    function iniciarScanner() {
        if (scannerAtivo) return;

        scanner.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            scannerAtivo = true;
            atualizarStatus("SENSOR_ONLINE: BUSCANDO_TOKEN", 'text-emerald-500');
        })
        .catch(err => {
            scannerAtivo = false;
            atualizarStatus("HARDWARE_FAILURE", 'text-red-400');
            errorLog.innerText = "CRITICAL: " + err;
            errorLog.classList.remove('hidden');
        });
    }

    iniciarScanner();
</script>
{% endblock %}
