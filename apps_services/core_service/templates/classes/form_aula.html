{% extends 'base.html' %}

{% block content %}
<div class="p-6 md:p-12 max-w-2xl mx-auto">
    <header class="mb-10 text-center">
        <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-[0.2em] mb-2">Session Dispatcher</p>
        <h1 class="text-3xl font-black text-white tracking-tight uppercase italic">Lançar <span class="text-indigo-500">Aula</span></h1>
    </header>

    <form method="post" class="bg-slate-900/40 p-8 md:p-10 rounded-3xl border border-white/5 shadow-2xl space-y-8">
        {% csrf_token %}
        
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Turma Ativa (Target)</label>
            <select name="turma" class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500/50 appearance-none mono">
                {% for turma in minhas_turmas %}
                    <option value="{{ turma.id }}">{{ turma.disciplina.nome }} [{{ turma.semestre }}]</option>
                {% endfor %}
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Physical Location (Sala)</label>
                <select name="sala" class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500/50 appearance-none mono">
                    {% for sala in salas %}
                        <option value="{{ sala.id }}">{{ sala.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Workload (H/A)</label>
                <select name="peso_aula" class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500/50 appearance-none mono">
                    <option value="2">02 Horas</option>
                    <option value="4">04 Horas</option>
                </select>
            </div>
        </div>

        <div class="pt-6">
            <button type="submit" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-xs uppercase tracking-[0.2em] shadow-xl shadow-indigo-900/30 transition-all">
                Broadcast QR Access
            </button>
            <a href="{% url 'dashboard' %}" class="block text-center mt-6 text-[10px] font-bold text-slate-600 uppercase tracking-widest hover:text-white transition-colors">Abort Dispatch</a>
        </div>
    </form>
</div>
{% endblock %}
