{% extends 'base.html' %}

{% block content %}
<div class="p-6 md:p-12 max-w-7xl mx-auto">
    <header class="page-header-container flex flex-col md:flex-row justify-between items-start md:items-end gap-8">
        <div class="flex items-center gap-6">
            <a href="{% url 'dashboard' %}" class="btn-back-minimal">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
            </a>
            <div>
                <h1 class="page-title">Lançar <span class="text-indigo-500">Aula</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-2 ml-1">Chamada dinâmica via Sala de Aula</p>
            </div>
        </div>
        <div class="header-accent"></div>
    </header>

    <form method="post" class="bg-slate-900/40 p-8 md:p-10 rounded-3xl border border-white/5 shadow-2xl space-y-8">
        {% csrf_token %}
        
        <!-- Turma -->
        <div class="space-y-2">
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Turma Ativa</label>
            <div class="relative">
                <select name="turma" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500/50 appearance-none cursor-pointer mono">
                    <option value="" disabled selected>-- SELECIONAR_TURMA --</option>
                    {% for turma in minhas_turmas %}
                        <option value="{{ turma.id }}">{{ turma.disciplina.nome }} [{{ turma.semestre }}]</option>
                    {% endfor %}
                </select>
                <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none text-slate-600">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Sala -->
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Localização (Sala)</label>
                <div class="relative">
                    <select name="sala" required class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500/50 appearance-none cursor-pointer mono">
                        <option value="" disabled selected>-- SELECIONAR_SALA --</option>
                        {% for sala in salas %}
                            <option value="{{ sala.id }}">{{ sala.nome }}</option>
                        {% endfor %}
                    </select>
                    <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none text-slate-600">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </div>
                </div>
            </div>

            <!-- Peso -->
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Carga Horária (h/a)</label>
                <div class="relative">
                    <input type="number" name="peso_aula" required min="1" max="10" value="2"
                           class="w-full bg-slate-950 border border-white/10 rounded-xl px-5 py-4 text-sm text-white focus:border-indigo-500/50 outline-none mono"
                           placeholder="Ex: 1, 2, 3...">
                </div>
            </div>
        </div>

        <div class="pt-6 border-t border-white/5">
            <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold text-xs uppercase tracking-[0.2em] shadow-lg shadow-indigo-900/30 transition-all">
                Criar
            </button>
            <a href="{% url 'dashboard' %}" class="block text-center mt-6 text-[10px] font-bold text-slate-600 uppercase tracking-widest hover:text-white transition-colors">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
