version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=frequencia_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./apps_services/core_service
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./apps_services/core_service:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DEBUG=True
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=frequencia_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_worker:
    build: ./apps_services/core_service
    command: celery -A core_config worker --loglevel=info
    volumes:
      - ./apps_services/core_service:/app
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=frequencia_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - redis
      - rabbitmq
      - db

volumes:
  postgres_data:
